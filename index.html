<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>I'm High on Crack and I Have a Gun</title>
  <style>
    :root {
      --bg: #040404;
      --text: #f2eadf;
      --muted: #c8b29a;
      --line: rgba(255,255,255,.10);
      --panel: rgba(0,0,0,.52);
      --paper: #eadcc4;
      --ink: #2b2118;
      --shadow: 0 30px 90px rgba(0,0,0,.55);
      --shadow-deep: 0 50px 140px rgba(0,0,0,.78);
      --danger: #9c2d24;
      --warm: #daac72;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      background: #000;
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }
    body { overflow: hidden; }

    button, a { font: inherit; }
    a { color: inherit; text-decoration: none; }

    .app {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }

    .grain, .vignette {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 200;
    }
    .grain {
      opacity: .05;
      background-image:
        linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
      background-size: 4px 4px;
      mix-blend-mode: soft-light;
    }
    .vignette {
      box-shadow: inset 0 0 220px rgba(0,0,0,.78);
    }

    .scene {
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1s ease, transform 1s ease;
      transform: scale(1.01);
    }
    .scene.show {
      opacity: 1;
      pointer-events: auto;
      transform: scale(1);
    }

    .pill {
      border: 1px solid var(--line);
      background: rgba(0,0,0,.48);
      color: var(--muted);
      border-radius: 999px;
      padding: 10px 14px;
      text-transform: uppercase;
      letter-spacing: .14em;
      font-size: 12px;
      backdrop-filter: blur(10px);
    }

    .reset {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 220;
      cursor: pointer;
    }

    .audio-toggle {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 220;
      cursor: pointer;
      color: #fff;
    }

    .hint {
      position: absolute;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      z-index: 220;
      max-width: 92vw;
      text-align: center;
    }

    .hidden {
      display: none !important;
    }

    /* Opening scene */
    .pickup-scene {
      background:
        linear-gradient(180deg, rgba(0,0,0,.16), rgba(0,0,0,.58)),
        url('ticket-collage.png') center center / 680px auto repeat,
        #050505;
    }

    .bg-video-wrap {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }
    .bg-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: .75;
      filter: brightness(.62) contrast(1.04) saturate(.88);
      transform: scale(1.04);
    }
    .video-darkener {
      position: absolute;
      inset: 0;
      z-index: 2;
      background:
        linear-gradient(180deg, rgba(0,0,0,.42), rgba(0,0,0,.66)),
        radial-gradient(circle at center, transparent 0%, rgba(0,0,0,.18) 48%, rgba(0,0,0,.62) 100%);
    }

    .banner-wrap {
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      width: min(1500px, 94vw);
      z-index: 10;
      pointer-events: none;
    }
    .site-banner {
      width: 100%;
      display: block;
      border-radius: 20px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,.06);
      background: rgba(0,0,0,.30);
    }

    .ground-ticket {
      position: absolute;
      left: 50%;
      bottom: 7vh;
      transform: translateX(-50%) rotate(-6deg);
      width: min(760px, 78vw);
      aspect-ratio: 2.05 / 1;
      border-radius: 24px;
      overflow: hidden;
      background: #000;
      z-index: 12;
      cursor: pointer;
      box-shadow: var(--shadow-deep);
      transition: transform .8s ease, opacity 1s ease, box-shadow .6s ease;
    }
    .ground-ticket:hover {
      transform: translateX(-50%) rotate(-4deg) translateY(-10px) scale(1.02);
      box-shadow: 0 62px 160px rgba(0,0,0,.8);
    }
    .ground-ticket img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .ground-ticket::after {
      content: "Click to pick up";
      position: absolute;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      border-radius: 999px;
      padding: 10px 14px;
      background: rgba(0,0,0,.52);
      border: 1px solid rgba(255,255,255,.12);
      color: #fff;
      text-transform: uppercase;
      letter-spacing: .15em;
      font-size: 11px;
      backdrop-filter: blur(8px);
    }
    .pickup-scene.animate-out .ground-ticket {
      transform: translateX(-50%) translateY(-34vh) scale(.48) rotate(-2deg);
      opacity: .04;
    }

    /* ATM */
    .atm-scene {
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #040404, #090909);
    }
    .atm-stage {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 18px;
    }
    .atm-machine {
      position: relative;
      width: min(1000px, 94vw);
      aspect-ratio: .92 / 1;
      border-radius: 28px;
      overflow: hidden;
      background: #000;
      box-shadow: var(--shadow-deep);
      animation: atmZoom 9s ease-in-out infinite alternate;
    }
    @keyframes atmZoom {
      from { transform: scale(1); }
      to { transform: scale(1.016); }
    }
    .atm-machine img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .atm-overlay {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255,255,255,.02), transparent 18%, transparent 82%, rgba(255,255,255,.02)),
        radial-gradient(circle at 25% 42%, rgba(140,255,230,.10), transparent 12%),
        radial-gradient(circle at 57% 58%, rgba(255,210,120,.10), transparent 7%);
      pointer-events: none;
    }

    .atm-ticket {
      position: absolute;
      left: 50%;
      bottom: 14%;
      transform: translateX(-50%) rotate(-2deg);
      width: min(430px, 44vw);
      aspect-ratio: 2.05 / 1;
      border-radius: 18px;
      overflow: hidden;
      background: #000;
      z-index: 10;
      box-shadow: 0 20px 60px rgba(0,0,0,.56);
      transition: transform 1.9s cubic-bezier(.18,.84,.2,1), opacity 1s ease;
    }
    .atm-ticket img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .atm-scene.animate-insert .atm-ticket {
      transform: translateX(-50%) translateY(-12%) scale(.72) rotate(-1deg);
      opacity: .98;
    }
    .atm-scene.finish-insert .atm-ticket {
      transform: translateX(-50%) translateY(-28%) scale(.28) rotate(-1deg);
      opacity: .03;
    }

    .dvd {
      position: absolute;
      left: 50%;
      bottom: 4.5%;
      width: min(380px, 32vw);
      aspect-ratio: .72 / 1;
      transform: translate(-50%, 230%) rotateX(55deg) scale(.82);
      transform-origin: center center;
      transition: transform 1.8s cubic-bezier(.2,.8,.2,1), opacity 1s ease;
      opacity: 0;
      perspective: 2200px;
      z-index: 12;
    }
    .atm-scene.reveal-dvd .dvd {
      transform: translate(-50%, 0%) rotateX(6deg) scale(1);
      opacity: 1;
    }

    .case {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      cursor: pointer;
    }
    .case-front, .case-inside {
      position: absolute;
      inset: 0;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.08);
      box-shadow: var(--shadow);
      background: #000;
      backface-visibility: hidden;
    }
    .case-front img, .case-inside img {
      width: 100%;
      height: 100%;
      display: block;
    }
    .case-front img {
      object-fit: cover;
    }
    .case-inside {
      display: grid;
      place-items: center;
      padding: 10px;
      background:
        radial-gradient(circle at center, rgba(255,255,255,.03), transparent 38%),
        linear-gradient(180deg, #070707, #020202);
    }
    .case-inside img {
      object-fit: contain;
      object-position: center;
      padding: 6px;
      background: #050505;
      border-radius: 14px;
    }
    .case-front {
      transform-origin: left center;
      transition: transform 2.2s cubic-bezier(.18,.82,.18,1);
      z-index: 4;
    }
    .case.open .case-front {
      transform: rotateY(-132deg);
    }

    .case-enter {
      position: absolute;
      left: 50%;
      bottom: 10px;
      transform: translateX(-50%);
      z-index: 7;
      opacity: 0;
      pointer-events: none;
      transition: opacity .9s ease .55s;
    }
    .case.open .case-enter {
      opacity: 1;
      pointer-events: auto;
    }

    /* Threads */
    .cloud-scene {
      display: grid;
      place-items: start center;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-y;
      overscroll-behavior-y: contain;
      background: linear-gradient(180deg, #050505, #000 72%);
    }

    .threads-video-wrap {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }
    .threads-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: .42;
      filter: brightness(.42) contrast(1.03) saturate(.85);
      transform: scale(1.06);
    }
    .threads-darkener {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(0,0,0,.44), rgba(0,0,0,.70)),
        radial-gradient(circle at center, rgba(0,0,0,.08) 0%, rgba(0,0,0,.24) 50%, rgba(0,0,0,.60) 100%);
      z-index: 1;
    }

    .cloud-core {
      position: relative;
      z-index: 5;
      width: min(1320px, 96vw);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 42px 0 130px;
    }

    .threads-title {
      width: min(1100px, 94vw);
      text-align: center;
      position: relative;
      z-index: 6;
    }
    .threads-title h2 {
      margin: 0;
      font-size: clamp(28px, 4vw, 58px);
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    .threads-title p {
      margin: 14px 0 0;
      font-size: 17px;
      color: var(--muted);
    }
    .update-pill {
      margin-top: 18px;
      display: inline-block;
      padding: 12px 18px;
      border-radius: 999px;
      background: rgba(0,0,0,.32);
      border: 1px solid rgba(255,255,255,.12);
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .14em;
      font-size: 12px;
    }

    .thread-board {
      position: relative;
      width: min(1240px, 96vw);
      height: 980px;
      margin-top: 26px;
      z-index: 8;
    }

    .thread-knot {
      position: absolute;
      left: 50%;
      top: 8%;
      transform: translateX(-50%);
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: radial-gradient(circle, #fff 0%, #dcb98c 35%, #6b402a 100%);
      box-shadow: 0 0 12px rgba(255,255,255,.16), 0 0 30px rgba(213,167,103,.18);
      z-index: 9;
    }

    .yarn-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 7;
      overflow: visible;
    }
    .yarn {
      fill: none;
      stroke: rgba(180,140,110,.86);
      stroke-width: 3;
      stroke-linecap: round;
      filter: drop-shadow(0 0 4px rgba(0,0,0,.5));
    }
    .yarn-shadow {
      fill: none;
      stroke: rgba(0,0,0,.48);
      stroke-width: 6;
      stroke-linecap: round;
    }

    .thread-node {
      position: absolute;
      width: 220px;
      padding: 12px;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,.10);
      background:
        linear-gradient(180deg, rgba(30,24,20,.88), rgba(10,10,10,.70)),
        rgba(10,10,10,.62);
      backdrop-filter: blur(9px);
      box-shadow: 0 18px 42px rgba(0,0,0,.34);
      color: var(--text);
      text-align: center;
      cursor: pointer;
      transition: transform .35s ease, background .35s ease, border-color .35s ease, box-shadow .35s ease;
      transform: translate3d(0,0,0);
      touch-action: none;
      z-index: 10;
    }
    .thread-node::before,
    .thread-node::after {
      content: "";
      position: absolute;
      top: -8px;
      width: 54px;
      height: 16px;
      border-radius: 4px;
      background: linear-gradient(180deg, rgba(230,215,180,.78), rgba(196,175,135,.62));
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
      opacity: .92;
      transform: rotate(-7deg);
      pointer-events: none;
    }
    .thread-node::before {
      left: 18px;
    }
    .thread-node::after {
      right: 18px;
      transform: rotate(8deg);
    }
    .thread-node .pin {
      position: absolute;
      top: 10px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fff 0%, #efc88d 32%, #8b2b20 70%, #4a120d 100%);
      box-shadow: 0 0 0 2px rgba(0,0,0,.18), 0 3px 10px rgba(0,0,0,.35);
      pointer-events: none;
      z-index: 2;
    }
    .thread-node .pin.left { left: 18px; }
    .thread-node .pin.right { right: 18px; }
    .thread-node .stub {
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      width: 3px;
      height: 24px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(175,135,105,.95), rgba(117,74,50,.85));
      box-shadow: 0 0 4px rgba(0,0,0,.35);
      pointer-events: none;
      opacity: .9;
    }
    .thread-node:hover {
      transform: translateY(-8px) scale(1.03);
      background: rgba(20,20,20,.88);
      border-color: rgba(255,255,255,.18);
      box-shadow: 0 28px 62px rgba(0,0,0,.45);
    }
    .thread-node.dragging {
      transition: none;
      box-shadow: 0 40px 80px rgba(0,0,0,.58);
    }
    .thread-node img {
      width: 100%;
      aspect-ratio: .72 / 1;
      object-fit: cover;
      display: block;
      border-radius: 14px;
      margin-bottom: 12px;
      background: #111;
    }
    .thread-node .mini {
      display: block;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .14em;
      margin-bottom: 8px;
    }
    .thread-node b {
      display: block;
      font-size: 18px;
      line-height: 1.1;
    }
    .thread-node.important {
      border-color: rgba(218,172,114,.30);
      box-shadow: 0 20px 56px rgba(125,78,32,.20), 0 18px 42px rgba(0,0,0,.34);
    }

    /* positions */
    #node-trailer1 { left: 2.5%; top: 23%; }
    #node-trailer2 { left: 19%; top: 11%; }
    #node-analysis { left: 38%; top: 27%; }
    #node-sample   { left: 50%; top: 9%; transform: translateX(-50%); }
    #node-july     { right: 19%; top: 11%; }
    #node-dopesick { right: 2.5%; top: 23%; }
    #node-gods     { left: 50%; top: 56%; transform: translateX(-50%); }

    /* viewers */
    .book-viewer, .video-viewer, .link-viewer {
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity .45s ease;
      z-index: 260;
    }
    .book-viewer.show, .video-viewer.show, .link-viewer.show {
      opacity: 1;
      pointer-events: auto;
    }
    .book-backdrop, .video-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,.84);
      backdrop-filter: blur(12px);
    }

    .book-shell, .video-shell {
      position: absolute;
      inset: 4vh 4vw;
      border-radius: 28px;
      background: linear-gradient(180deg, #17110d, #0d0a08 62%, #080707);
      border: 1px solid rgba(255,255,255,.08);
      box-shadow: var(--shadow-deep);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .book-close, .video-close, .open-book-btn, .book-link-btn, .book-controls button {
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.05);
      color: #fff;
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
    .book-close, .video-close {
      align-self: flex-end;
    }

    .book-stage {
      flex: 1;
      min-height: 0;
      display: grid;
      place-items: center;
      position: relative;
    }

    .book-cover-panel, .book-pages {
      width: min(1120px, 100%);
      height: min(74vh, 100%);
      transition: opacity .55s ease, transform .55s ease;
    }
    .book-cover-panel {
      display: grid;
      place-items: center;
      gap: 16px;
      align-content: center;
    }
    .book-cover-panel img {
      height: min(62vh, 100%);
      width: auto;
      max-width: 100%;
      object-fit: contain;
      border-radius: 18px;
      background: #111;
      box-shadow: var(--shadow);
    }
    .book-cover-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .book-pages {
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      transform: scale(.98);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .book-viewer.reading .book-cover-panel {
      opacity: 0;
      pointer-events: none;
      transform: scale(.96);
    }
    .book-viewer.reading .book-pages {
      opacity: 1;
      pointer-events: auto;
      transform: scale(1);
    }

    .page {
      min-width: 0;
      position: relative;
      overflow: hidden;
      border-radius: 16px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,.06) 12%, rgba(255,255,255,.02)),
        var(--paper);
      color: var(--ink);
      box-shadow: inset 0 0 0 1px rgba(90,60,32,.12), 0 20px 40px rgba(0,0,0,.25);
    }
    .page::before {
      content: "";
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(180deg, rgba(90,60,32,.03), rgba(90,60,32,.03) 1px, transparent 1px, transparent 30px);
      opacity: .5;
      pointer-events: none;
    }
    .page-inner {
      position: relative;
      padding: 28px 26px;
      height: 100%;
      overflow: auto;
    }
    .page-kicker {
      font-size: 11px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: #7b5a39;
      margin-bottom: 10px;
    }
    .page h3 {
      margin: 0 0 16px;
      font-size: 28px;
      line-height: 1.02;
      text-transform: uppercase;
    }
    .page-text {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 18px;
      line-height: 1.62;
      white-space: pre-wrap;
    }

    .book-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }
    .book-status {
      min-width: 120px;
      text-align: center;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .12em;
      font-size: 12px;
    }

    .video-frame-wrap {
      flex: 1;
      min-height: 0;
      display: grid;
      place-items: center;
    }
    .video-frame {
      width: min(1220px, 100%);
      aspect-ratio: 16 / 9;
      border-radius: 20px;
      overflow: hidden;
      background: #000;
      box-shadow: var(--shadow);
    }
    .video-frame iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    @media (max-width: 1100px) {
      .thread-board {
        height: 1460px;
      }
      #node-trailer1 { left: 5%; top: 9%; }
      #node-trailer2 { right: 5%; left: auto; top: 9%; }
      #node-analysis { left: 5%; top: 31%; }
      #node-sample   { left: 50%; top: 31%; transform: translateX(-50%); }
      #node-july     { right: 5%; left: auto; top: 31%; }
      #node-dopesick { left: 5%; top: 57%; right: auto; }
      #node-gods     { right: 5%; left: auto; top: 57%; transform: none; }
    }

    @media (max-width: 820px) {
      .banner-wrap {
        top: 10px;
        width: 96vw;
      }
      .ground-ticket {
        width: 92vw;
        bottom: 9vh;
      }
      .atm-machine {
        width: 96vw;
      }
      .atm-ticket {
        width: 54vw;
        bottom: 16%;
      }
      .dvd {
        width: min(300px, 60vw);
        bottom: 2%;
      }

      .cloud-scene {
        overflow-y: auto;
        overflow-x: hidden;
        -webkit-overflow-scrolling: touch;
        touch-action: pan-y;
      }
      .cloud-core {
        min-height: auto;
        padding: 20px 0 220px;
      }
      .threads-title {
        width: 92vw;
        padding: 0 10px;
      }
      .threads-title h2 {
        font-size: 34px;
        line-height: 1.02;
      }
      .threads-title p {
        font-size: 15px;
      }
      .update-pill {
        max-width: 92vw;
        font-size: 10px;
        line-height: 1.45;
      }

      .thread-board {
        width: min(390px, 94vw);
        height: auto;
        min-height: 0;
        margin-top: 18px;

    function splitIntoPages(text, charsPerPage = 2200) {
      const cleaned = text.replace(/\r/g, "").trim();
      const chunks = [];
      let remaining = cleaned;
      while (remaining.length > charsPerPage) {
        let slice = remaining.slice(0, charsPerPage);
        let breakAt = Math.max(
          slice.lastIndexOf("\n\n"),
          slice.lastIndexOf(". "),
          slice.lastIndexOf("? "),
          slice.lastIndexOf("! ")
        );
        if (breakAt < charsPerPage * 0.55) breakAt = charsPerPage;
        chunks.push(remaining.slice(0, breakAt).trim());
        remaining = remaining.slice(breakAt).trim();
      }
      if (remaining.length) chunks.push(remaining);
      return chunks;
    }

    Object.keys(books).forEach(key => books[key].pages = splitIntoPages(books[key].raw));

    const bgVideo = document.getElementById('bgVideo');
    const threadsVideo = document.getElementById('threadsVideo');
    const podcastAudio = document.getElementById('podcastAudio');
    const audioToggle = document.getElementById('audioToggle');

    const pickupScene = document.getElementById('pickupScene');
    const atmScene = document.getElementById('atmScene');
    const cloudScene = document.getElementById('cloudScene');
    const groundTicket = document.getElementById('groundTicket');
    const dvdCase = document.getElementById('dvdCase');
    const enterThreadsBtn = document.getElementById('enterThreadsBtn');
    const resetBtn = document.getElementById('resetBtn');
    const hint = document.getElementById('hint');

    const videoViewer = document.getElementById('videoViewer');
    const videoBackdrop = document.getElementById('videoBackdrop');
    const videoClose = document.getElementById('videoClose');
    const trailerFrame = document.getElementById('trailerFrame');
    const linkViewer = document.getElementById('linkViewer');
    const linkBackdrop = document.getElementById('linkBackdrop');
    const linkClose = document.getElementById('linkClose');
    const linkFrame = document.getElementById('linkFrame');
    const linkOpenNewTab = document.getElementById('linkOpenNewTab');

    const bookViewer = document.getElementById('bookViewer');
    const bookBackdrop = document.getElementById('bookBackdrop');
    const bookClose = document.getElementById('bookClose');
    const openBookBtn = document.getElementById('openBookBtn');
    const externalLinkBtn = document.getElementById('externalLinkBtn');
    const prevPageBtn = document.getElementById('prevPageBtn');
    const nextPageBtn = document.getElementById('nextPageBtn');
    const viewerCover = document.getElementById('viewerCover');
    const pageKickerLeft = document.getElementById('pageKickerLeft');
    const pageTitleLeft = document.getElementById('pageTitleLeft');
    const pageTextLeft = document.getElementById('pageTextLeft');
    const pageKickerRight = document.getElementById('pageKickerRight');
    const pageTitleRight = document.getElementById('pageTitleRight');
    const pageTextRight = document.getElementById('pageTextRight');
    const bookStatus = document.getElementById('bookStatus');

    const threadBoard = document.getElementById('threadBoard');
    const threadKnot = document.getElementById('threadKnot');
    const yarnLayer = document.getElementById('yarnLayer');
    const threadNodes = Array.from(document.querySelectorAll('.thread-node'));

    let state = 0;
    let currentBook = null;
    let pageIndex = 0;
    let audioOn = false;

    function setAudioButton() {
      audioToggle.textContent = audioOn ? 'Podcast: On' : 'Podcast: Off';
    }

    async function tryStartAudio() {
      try {
        podcastAudio.volume = 0.85;
        await podcastAudio.play();
        audioOn = true;
      } catch (e) {
        audioOn = false;
      }
      setAudioButton();
    }

    function toggleAudio() {
      if (audioOn) {
        podcastAudio.pause();
        audioOn = false;
      } else {
        podcastAudio.play().then(() => {
          audioOn = true;
          setAudioButton();
        }).catch(() => {
          audioOn = false;
          setAudioButton();
        });
      }
      setAudioButton();
    }

    function resetAll() {
      state = 0;
      pickupScene.classList.add('show');
      pickupScene.classList.remove('animate-out');
      atmScene.classList.remove('show', 'animate-insert', 'finish-insert', 'reveal-dvd');
      cloudScene.classList.remove('show');
      dvdCase.classList.remove('open');
      closeBook();
      closeVideo();
      closeLinkViewer();
      hint.textContent = 'Click the ticket to begin';
      try { bgVideo.play(); } catch (e) {}
      try { threadsVideo.play(); } catch (e) {}
      drawYarn();
    }

    function beginSequence() {
      if (state !== 0) return;
      state = 1;
      pickupScene.classList.add('animate-out');
      hint.textContent = 'Picking up the ticket';

      setTimeout(() => {
        pickupScene.classList.remove('show');
        atmScene.classList.add('show');
        hint.textContent = 'Inserting the ticket';
      }, 1100);

      setTimeout(() => atmScene.classList.add('animate-insert'), 1800);
      setTimeout(() => atmScene.classList.add('finish-insert'), 3400);
      setTimeout(() => {
        atmScene.classList.add('reveal-dvd');
        hint.textContent = 'Click the case to open it';
      }, 4850);
    }

    function openCase() {
      if (state < 1 || dvdCase.classList.contains('open')) return;
      state = 2;
      dvdCase.classList.add('open');
      hint.textContent = 'Look inside, then enter the archive';
    }

    function showThreads() {
      atmScene.classList.remove('show');
      cloudScene.classList.add('show');
      hint.textContent = 'Pull a thread';
      drawYarn();
    }

    function openThread(key) {
      currentBook = books[key];
      pageIndex = 0;
      viewerCover.src = currentBook.cover;
      viewerCover.alt = currentBook.title;
      bookViewer.classList.add('show');
      bookViewer.classList.remove('reading');

      if (currentBook.url) {
        externalLinkBtn.classList.remove('hidden');
        externalLinkBtn.href = currentBook.url;
      } else {
        externalLinkBtn.classList.add('hidden');
        externalLinkBtn.href = '#';
      }

      renderPages();
    }

    function renderPages() {
      if (!currentBook) return;
      const pages = currentBook.pages || [];
      const left = pages[pageIndex] || '';
      const right = pages[pageIndex + 1] || '';

      pageKickerLeft.textContent = currentBook.kicker;
      pageTitleLeft.textContent = currentBook.title;
      pageTextLeft.textContent = left;

      pageKickerRight.textContent = `Page ${pageIndex + 2}`;
      pageTitleRight.textContent = right ? currentBook.title : 'End';
      pageTextRight.textContent = right || 'No more pages yet.';

      bookStatus.textContent = `Page ${pageIndex + 1}`;
      prevPageBtn.disabled = pageIndex === 0;
      nextPageBtn.disabled = pageIndex + 2 >= pages.length;
    }

    function startReading() {
      if (!currentBook) return;
      bookViewer.classList.add('reading');
      renderPages();
    }

    function closeBook() {
      bookViewer.classList.remove('show', 'reading');
      currentBook = null;
      pageIndex = 0;
      externalLinkBtn.classList.add('hidden');
      externalLinkBtn.href = '#';
    }

    function nextPages() {
      if (!currentBook) return;
      if (pageIndex + 2 < currentBook.pages.length) {
        pageIndex += 2;
        renderPages();
      }
    }

    function prevPages() {
      if (!currentBook) return;
      if (pageIndex - 2 >= 0) {
        pageIndex -= 2;
        renderPages();
      }
    }

    function openVideo(url) {
      trailerFrame.src = url;
      videoViewer.classList.add('show');
    }

    function openEmbeddedLink(url) {
      linkFrame.src = url;
      linkOpenNewTab.href = url;
      linkViewer.classList.add('show');
    }

    function closeLinkViewer() {
      linkViewer.classList.remove('show');
      linkFrame.src = '';
      linkOpenNewTab.href = '#';
    }

    function closeVideo() {
      videoViewer.classList.remove('show');
      trailerFrame.src = '';
    }

    function drawYarn() {
      const boardRect = threadBoard.getBoundingClientRect();
      const knotRect = threadKnot.getBoundingClientRect();
      const x1 = knotRect.left - boardRect.left + knotRect.width / 2;
      const y1 = knotRect.top - boardRect.top + knotRect.height / 2;

      yarnLayer.setAttribute('viewBox', `0 0 ${boardRect.width} ${boardRect.height}`);
      yarnLayer.innerHTML = '';

      threadNodes.forEach(node => {
        const r = node.getBoundingClientRect();
        const x2 = r.left - boardRect.left + r.width / 2;
        const y2 = r.top - boardRect.top + 8;
        const midY = y1 + (y2 - y1) * 0.5;
        const curve = Math.abs(x2 - x1) * 0.14 + 30;

        const path = `M ${x1} ${y1} C ${x1} ${midY}, ${x2} ${midY - curve}, ${x2} ${y2}`;

        const shadow = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        shadow.setAttribute('class', 'yarn-shadow');
        shadow.setAttribute('d', path);

        const yarn = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        yarn.setAttribute('class', 'yarn');
        yarn.setAttribute('d', path);

        yarnLayer.appendChild(shadow);
        yarnLayer.appendChild(yarn);
      });
    }

    function wireDraggableThread(node) {
      if (window.matchMedia('(max-width: 820px)').matches) {
        node.addEventListener('click', () => {
          if (node.dataset.video) openVideo(node.dataset.video);
          if (node.dataset.embedlink) openEmbeddedLink(node.dataset.embedlink);
          if (node.dataset.book) openThread(node.dataset.book);
        });
        return;
      }

      let startX = 0, startY = 0, moved = false, pointerId = null;
      let origTransform = '';

      node.addEventListener('pointerdown', (e) => {
        pointerId = e.pointerId;
        startX = e.clientX;
        startY = e.clientY;
        moved = false;
        origTransform = getComputedStyle(node).transform === 'none' ? '' : getComputedStyle(node).transform;
        node.classList.add('dragging');
        node.setPointerCapture(pointerId);
      });

      node.addEventListener('pointermove', (e) => {
        if (pointerId === null || e.pointerId !== pointerId) return;
        const dx = Math.max(-22, Math.min(22, e.clientX - startX));
        const dy = Math.max(-10, Math.min(34, e.clientY - startY));
        if (Math.abs(dx) > 4 || Math.abs(dy) > 4) moved = true;
        node.style.transform = `translate(${dx}px, ${dy}px)`;
        drawYarn();
      });

      node.addEventListener('pointerup', (e) => {
        if (pointerId === null || e.pointerId !== pointerId) return;
        node.releasePointerCapture(pointerId);
        pointerId = null;
        node.classList.remove('dragging');
        node.style.transform = '';
        drawYarn();

        if (!moved) {
          if (node.dataset.video) openVideo(node.dataset.video);
          if (node.dataset.embedlink) openEmbeddedLink(node.dataset.embedlink);
          if (node.dataset.book) openThread(node.dataset.book);
        }
      });

      node.addEventListener('pointercancel', () => {
        node.classList.remove('dragging');
        node.style.transform = '';
        pointerId = null;
        drawYarn();
      });
    }

    bgVideo.addEventListener('error', () => bgVideo.style.display = 'none');
    threadsVideo.addEventListener('error', () => threadsVideo.style.display = 'none');

    audioToggle.addEventListener('click', toggleAudio);
    groundTicket.addEventListener('click', () => {
      beginSequence();
      if (!audioOn) tryStartAudio();
    });
    dvdCase.addEventListener('click', openCase);
    enterThreadsBtn.addEventListener('click', showThreads);
    resetBtn.addEventListener('click', resetAll);

    videoClose.addEventListener('click', closeVideo);
    videoBackdrop.addEventListener('click', closeVideo);
    linkClose.addEventListener('click', closeLinkViewer);
    linkBackdrop.addEventListener('click', closeLinkViewer);

    openBookBtn.addEventListener('click', startReading);
    bookClose.addEventListener('click', closeBook);
    bookBackdrop.addEventListener('click', closeBook);
    nextPageBtn.addEventListener('click', nextPages);
    prevPageBtn.addEventListener('click', prevPages);

    threadNodes.forEach(wireDraggableThread);
    window.addEventListener('resize', drawYarn);

    document.addEventListener('DOMContentLoaded', () => {
      drawYarn();
      tryStartAudio();
      try { bgVideo.play(); } catch (e) {}
      try { threadsVideo.play(); } catch (e) {}
    });

    resetAll();
  </script>
